<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | SkillBridge</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top" data-app-nav></nav>
    <main class="container py-4">
      <div class="d-flex flex-column flex-lg-row justify-content-between gap-3 align-items-lg-center mb-4">
        <div>
          <h1 class="h2 mb-1">Dashboard</h1>
          <p class="text-secondary mb-0">Your services and booking requests.</p>
        </div>
        <a class="btn btn-success" href="/pages/listing-form.html">
          <i class="bi bi-plus-circle me-2"></i>New service
        </a>
      </div>

      <div class="alert alert-warning d-none" data-config-alert role="alert"></div>
      <div class="alert alert-info d-none" id="dashboardMessage" role="alert"></div>

      <section class="row g-4 mb-4">
        <div class="col-md-4">
          <div class="stat-card">
            <i class="bi bi-briefcase"></i>
            <span id="myListingsCount">0</span>
            <small>my services</small>
          </div>
        </div>
        <div class="col-md-4">
          <div class="stat-card">
            <i class="bi bi-calendar-check"></i>
            <span id="incomingBookingsCount">0</span>
            <small>incoming bookings</small>
          </div>
        </div>
        <div class="col-md-4">
          <div class="stat-card">
            <i class="bi bi-send-check"></i>
            <span id="outgoingBookingsCount">0</span>
            <small>my requests</small>
          </div>
        </div>
      </section>

      <div class="row g-4">
        <section class="col-lg-6">
          <div class="section-panel">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h2 class="h4 mb-0">My services</h2>
              <i class="bi bi-list-check text-success fs-4"></i>
            </div>
            <div id="myListings" class="vstack gap-3"></div>
          </div>
        </section>
        <section class="col-lg-6">
          <div class="section-panel">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h2 class="h4 mb-0">Bookings</h2>
              <i class="bi bi-calendar-week text-success fs-4"></i>
            </div>
            <ul class="nav nav-tabs mb-3" id="bookingTabs" role="tablist">
              <li class="nav-item" role="presentation">
                <button class="nav-link active" id="incoming-tab" data-bs-toggle="tab" data-bs-target="#incoming" type="button" role="tab">Incoming</button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link" id="outgoing-tab" data-bs-toggle="tab" data-bs-target="#outgoing" type="button" role="tab">Requested</button>
              </li>
            </ul>
            <div class="tab-content">
              <div class="tab-pane fade show active" id="incoming" role="tabpanel" tabindex="0">
                <div id="incomingBookings" class="vstack gap-3"></div>
              </div>
              <div class="tab-pane fade" id="outgoing" role="tabpanel" tabindex="0">
                <div id="outgoingBookings" class="vstack gap-3"></div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>
    <script type="module" src="/src/js/pages/dashboard.js"></script>
  </body>
</html>
