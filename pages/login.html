<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | SkillBridge</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top" data-app-nav></nav>
    <main class="auth-shell">
      <section class="auth-panel shadow-sm">
        <div class="mb-4">
          <span class="badge text-bg-success mb-3">Welcome back</span>
          <h1 class="h3 mb-2">Login to SkillBridge</h1>
          <p class="text-secondary mb-0">Manage services, bookings and uploaded files.</p>
        </div>
        <div class="alert alert-warning d-none" data-config-alert role="alert"></div>
        <div class="alert d-none" id="loginMessage" role="alert"></div>
        <form id="loginForm" class="vstack gap-3">
          <div>
            <label class="form-label" for="email">Email</label>
            <input class="form-control" id="email" type="email" autocomplete="email" required />
          </div>
          <div>
            <label class="form-label" for="password">Password</label>
            <input class="form-control" id="password" type="password" autocomplete="current-password" required />
          </div>
          <button class="btn btn-success btn-lg" type="submit">
            <i class="bi bi-box-arrow-in-right me-2"></i>Login
          </button>
        </form>
        <p class="mt-4 mb-0 text-secondary">No account? <a href="/pages/register.html">Register here</a>.</p>
      </section>
    </main>
    <script type="module" src="/src/js/pages/login.js"></script>
  </body>
</html>
