<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile | SkillBridge</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top" data-app-nav></nav>
    <main class="container py-4">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="section-panel">
            <div class="d-flex align-items-center justify-content-between mb-4">
              <div>
                <h1 class="h2 mb-1">Profile</h1>
                <p class="text-secondary mb-0">Update your public provider information.</p>
              </div>
              <i class="bi bi-person-badge text-success display-6"></i>
            </div>
            <div class="alert alert-warning d-none" data-config-alert role="alert"></div>
            <div class="alert d-none" id="profileMessage" role="alert"></div>
            <form id="profileForm" class="row g-3">
              <div class="col-md-6">
                <label class="form-label" for="fullName">Full name</label>
                <input class="form-control" id="fullName" type="text" required />
              </div>
              <div class="col-md-6">
                <label class="form-label" for="city">City</label>
                <input class="form-control" id="city" type="text" placeholder="Sofia" />
              </div>
              <div class="col-12">
                <label class="form-label" for="bio">Bio</label>
                <textarea class="form-control" id="bio" rows="4" placeholder="Tell customers about your experience"></textarea>
              </div>
              <div class="col-md-6">
                <label class="form-label" for="phone">Phone</label>
                <input class="form-control" id="phone" type="tel" />
              </div>
              <div class="col-md-6">
                <label class="form-label" for="avatar">Avatar image</label>
                <input class="form-control" id="avatar" type="file" accept="image/*" />
              </div>
              <div class="col-12">
                <button class="btn btn-success" type="submit">
                  <i class="bi bi-save me-2"></i>Save profile
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>
    <script type="module" src="/src/js/pages/profile.js"></script>
  </body>
</html>
