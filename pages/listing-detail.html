<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Service details | SkillBridge</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top" data-app-nav></nav>
    <main class="container py-4">
      <div class="alert alert-warning d-none" data-config-alert role="alert"></div>
      <div class="row g-4">
        <section class="col-lg-8">
          <div class="section-panel">
            <div id="listingDetail"></div>
          </div>
          <div class="section-panel mt-4">
            <h2 class="h4 mb-3">Reviews</h2>
            <div id="reviewsList" class="vstack gap-3 mb-4"></div>
            <form id="reviewForm" class="row g-3">
              <div class="col-md-3">
                <label class="form-label" for="rating">Rating</label>
                <select class="form-select" id="rating">
                  <option value="5">5</option>
                  <option value="4">4</option>
                  <option value="3">3</option>
                  <option value="2">2</option>
                  <option value="1">1</option>
                </select>
              </div>
              <div class="col-md-9">
                <label class="form-label" for="comment">Comment</label>
                <input class="form-control" id="comment" type="text" maxlength="240" placeholder="Share your experience" />
              </div>
              <div class="col-12">
                <button class="btn btn-outline-success" type="submit">
                  <i class="bi bi-star me-2"></i>Add review
                </button>
              </div>
            </form>
          </div>
        </section>
        <aside class="col-lg-4">
          <div class="section-panel sticky-lg-top side-panel">
            <h2 class="h4 mb-3">Book this service</h2>
            <div class="alert d-none" id="detailMessage" role="alert"></div>
            <form id="bookingForm" class="vstack gap-3">
              <div>
                <label class="form-label" for="scheduledFor">Preferred date</label>
                <input class="form-control" id="scheduledFor" type="datetime-local" required />
              </div>
              <div>
                <label class="form-label" for="message">Message</label>
                <textarea class="form-control" id="message" rows="4" placeholder="Describe what you need"></textarea>
              </div>
              <button class="btn btn-success" type="submit">
                <i class="bi bi-calendar-plus me-2"></i>Request booking
              </button>
            </form>
            <hr />
            <h3 class="h5 mb-3">Files</h3>
            <div id="filesList" class="vstack gap-2"></div>
          </div>
        </aside>
      </div>
    </main>
    <script type="module" src="/src/js/pages/listing-detail.js"></script>
  </body>
</html>
