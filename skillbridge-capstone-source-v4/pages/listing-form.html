<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Service form | SkillBridge</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top" data-app-nav></nav>
    <main class="container py-4">
      <div class="row justify-content-center">
        <div class="col-xl-9">
          <div class="section-panel">
            <div class="d-flex flex-column flex-md-row justify-content-between gap-2 mb-4">
              <div>
                <h1 class="h2 mb-1" id="pageTitle">Create service</h1>
                <p class="text-secondary mb-0">Add details, pricing and upload supporting photos or files.</p>
              </div>
              <a class="btn btn-outline-dark align-self-start" href="/pages/dashboard.html">
                <i class="bi bi-arrow-left me-2"></i>Dashboard
              </a>
            </div>
            <div class="alert alert-warning d-none" data-config-alert role="alert"></div>
            <div class="alert d-none" id="listingMessage" role="alert"></div>
            <form id="listingForm" class="row g-3">
              <div class="col-md-8">
                <label class="form-label" for="title">Title</label>
                <input class="form-control" id="title" type="text" minlength="4" maxlength="120" required />
              </div>
              <div class="col-md-4">
                <label class="form-label" for="price">Price per hour (BGN)</label>
                <input class="form-control" id="price" type="number" min="0" step="1" required />
              </div>
              <div class="col-md-6">
                <label class="form-label" for="categoryId">Category</label>
                <select class="form-select" id="categoryId" required></select>
              </div>
              <div class="col-md-6">
                <label class="form-label" for="city">City</label>
                <input class="form-control" id="city" type="text" placeholder="Sofia" required />
              </div>
              <div class="col-12">
                <label class="form-label" for="description">Description</label>
                <textarea class="form-control" id="description" rows="5" minlength="20" required></textarea>
              </div>
              <div class="col-md-6">
                <label class="form-label" for="status">Status</label>
                <select class="form-select" id="status">
                  <option value="draft">Draft</option>
                  <option value="published">Published</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label" for="files">Photos or documents</label>
                <input class="form-control" id="files" type="file" multiple />
              </div>
              <div class="col-12 d-flex flex-wrap gap-2">
                <button class="btn btn-success" type="submit">
                  <i class="bi bi-save me-2"></i>Save service
                </button>
                <button class="btn btn-outline-danger d-none" id="deleteListing" type="button">
                  <i class="bi bi-trash me-2"></i>Delete
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>
    <script type="module" src="/src/js/pages/listing-form.js"></script>
  </body>
</html>
